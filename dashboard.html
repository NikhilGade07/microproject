<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mini LMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">Mini LMS</div>
            <div class="nav-links">
                <a href="courses.html">Courses</a>
                <a href="assignments.html">Assignments</a>
                <a href="profile.html">Profile</a>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </nav>
    </header>

    <main class="dashboard">
        <div class="welcome-section">
            <h1>Welcome back, John!</h1>
            <p>Here's what's happening with your courses</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>5</h3>
                <p>Active Courses</p>
            </div>
            <div class="stat-card">
                <h3>3</h3>
                <p>Pending Assignments</p>
            </div>
            <div class="stat-card">
                <h3>87%</h3>
                <p>Overall Progress</p>
            </div>
        </div>

        <section class="quick-actions">
            <h2>Quick Actions</h2>
            <div class="action-buttons">
                <button class="action-btn" onclick="window.location.href='courses.html'">Browse Courses</button>
                <button class="action-btn" onclick="window.location.href='assignments.html'">View Assignments</button>
            </div>
        </section>
    </main>
</body>
</html>
